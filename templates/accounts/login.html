{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'css/all.css' %}">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
  <!-- Custom -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/choices.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/materialdesignicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/tobii.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/swiper.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/tiny-slider.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
  <link rel="stylesheet" href="https://unpkg.com/feather-icons/dist/feather.css">
  <!-- Lightbox -->
  <link rel="stylesheet" href="{% static 'css/lightbox.min.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/7.4.47/css/materialdesignicons.min.css" integrity="sha512-/k658G6UsCvbkGRB3vPXpsPHgWeduJwiWGPCGS14IQw3xpr63AEMdA8nMYG2gmYkXitQxDTn6iiK/2fD4T87qA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <title>BT Real Estate | Account Login </title>
</head>

<body>


  <section class="bg-home zoom-image d-flex align-items-center">
    <div class="bg-overlay image-wrap" style="background: url('/static/img/1.jpg') center;"></div>
    <div class="bg-overlay bg-gradient-overlay"></div>
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="p-4 bg-white rounded-3 shadow-md mx-auto w-100" style="max-width: 400px;">
            <!-- Alerts -->
            {% include 'partials/_alerts.html' %}
            <form action="{% url 'login' %}" method="POST">
              {% csrf_token %}
              <a href="index.html"><img src="{% static 'img/LandProo.png' %}" class="mb-4 d-block mx-auto mw-100px" alt="Logo"></a>
              <h5 class="mb-3">Please sign in</h5>

              <div class="form-floating mb-2">
                <input type="text" class="form-control" id="floatingInput" placeholder="name@example.com" name="username">
                <label for="floatingInput">Username</label>
              </div>
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password">
                <label for="floatingPassword">Password</label>
              </div>

              <div class="d-flex justify-content-between">
                <div class="mb-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                    <label class="form-check-label text-muted" for="flexCheckDefault">Remember me</label>
                  </div>
                </div>
                <span class="forgot-pass text-muted mb-0"><a href="{% url 'password_reset' %}" class="text-muted">Forgot
                    password ?</a></span>
              </div>

              <button class="btn btn-primary w-100" type="submit">Sign in</button>

              <div class="col-12 text-center mt-3">
                <span><span class="text-muted me-2">Don't have an account ?</span> <a href="{% url 'register' %}"
                    class="text-dark fw-medium">Sign Up</a></span>
              </div><!--end col-->
            </form>
          </div>
        </div><!--end col-->
      </div><!--end row-->
    </div><!--end container-->
  </section><!--end section-->


  <script src="{% static 'js/jquery-3.3.1.min.js' %} "></script>
  <script src="{% static 'js/bootstrap.bundle.min.js' %} "></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script>
    feather.replace(); // Initialize Feather icons
  </script>
  <script src="{% static 'js/lightbox.min.js' %} "></script>
  <script src="{% static 'js/main.js' %} "></script>
  <script src="{% static 'js/app.js' %} "></script>
  <script src="{% static 'js/feather.min.js' %} "></script>
  <script src="{% static 'js/swiper.min.js' %} "></script>
  <script src="{% static 'js/tiny-slider.js' %} "></script>
  <script src="{% static 'js/tobii.js' %} "></script>
  <script src="{% static 'js/plugins.init.js' %} "></script>
</body>

</html>
